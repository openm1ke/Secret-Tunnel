<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Secret Tunnel settings screen">
  <rect width="1200" height="720" fill="#eef1f3"/>
  <rect x="0" y="0" width="220" height="720" fill="#152029"/>
  <rect x="18" y="36" width="44" height="44" rx="10" fill="#202c36" stroke="#41515e"/>
  <text x="78" y="56" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800">Secret Tunnel</text>
  <text x="78" y="80" fill="#b6c2cc" font-family="Inter,Arial,sans-serif" font-size="15">SSH SOCKS proxy · v0.1.0</text>
  <rect x="18" y="124" width="184" height="220" rx="8" fill="#182631" stroke="#33424d"/>
  <rect x="30" y="140" width="160" height="36" rx="7" fill="#dcfce7"/>
  <circle cx="50" cy="158" r="10" fill="#16a34a"/>
  <text x="66" y="164" fill="#14532d" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800">Running</text>
  <text x="30" y="214" fill="#8a98a3" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700">PROXY IP</text>
  <text x="30" y="238" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">••••••••</text>
  <text x="30" y="276" fill="#8a98a3" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700">SSH ENGINE</text>
  <text x="30" y="300" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800">System OpenSSH</text>
  <rect x="18" y="524" width="184" height="38" rx="7" fill="#ffffff"/>
  <text x="54" y="549" fill="#172026" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Settings</text>
  <rect x="18" y="380" width="184" height="38" rx="7" fill="#152029" stroke="#33424d"/>
  <text x="54" y="405" fill="#dbe4eb" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Connection</text>
  <rect x="18" y="428" width="184" height="38" rx="7" fill="#152029" stroke="#33424d"/>
  <text x="54" y="453" fill="#dbe4eb" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Servers</text>
  <rect x="18" y="476" width="184" height="38" rx="7" fill="#152029" stroke="#33424d"/>
  <text x="54" y="501" fill="#dbe4eb" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Proxy</text>

  <rect x="250" y="42" width="520" height="560" rx="10" fill="#ffffff" stroke="#d8dde1"/>
  <text x="276" y="78" fill="#172026" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900">Settings</text>

  <g font-family="Inter,Arial,sans-serif">
    <text x="276" y="118" fill="#47535c" font-size="14" font-weight="800">SSH engine</text>
    <circle cx="360" cy="113" r="8" fill="#ffffff" stroke="#cbd5dc"/>
    <text x="357" y="117" fill="#64717a" font-size="11" font-weight="900">?</text>
    <rect x="276" y="128" width="450" height="36" rx="6" fill="#fbfcfd" stroke="#c7cdd1"/>
    <text x="292" y="152" fill="#172026" font-size="14" font-weight="800">Embedded Rust SSH (experimental)</text>

    <rect x="276" y="178" width="450" height="58" rx="7" fill="#fffbeb" stroke="#fde68a"/>
    <text x="292" y="202" fill="#92400e" font-size="13">Embedded Rust SSH runs the SOCKS tunnel inside the app.</text>
    <text x="292" y="222" fill="#92400e" font-size="13">System OpenSSH remains the stable fallback.</text>

    <text x="276" y="270" fill="#47535c" font-size="14" font-weight="800">IPinfo token</text>
    <circle cx="372" cy="265" r="8" fill="#ffffff" stroke="#cbd5dc"/>
    <text x="369" y="269" fill="#64717a" font-size="11" font-weight="900">?</text>
    <rect x="276" y="280" width="330" height="36" rx="6" fill="#fbfcfd" stroke="#c7cdd1"/>
    <text x="292" y="304" fill="#172026" font-size="15" font-weight="900">••••••••••••••</text>
    <rect x="616" y="280" width="36" height="36" rx="6" fill="#ffffff" stroke="#c7cdd1"/>
    <text x="628" y="304" fill="#172026" font-size="14">👁</text>
    <rect x="662" y="280" width="36" height="36" rx="6" fill="#ffffff" stroke="#c7cdd1"/>
    <text x="673" y="304" fill="#172026" font-size="14">⧉</text>

    <rect x="276" y="348" width="16" height="16" rx="4" fill="#147df5"/>
    <text x="306" y="362" fill="#47535c" font-size="14" font-weight="800">Hide IPs and tokens by default</text>
    <circle cx="522" cy="357" r="8" fill="#ffffff" stroke="#cbd5dc"/>
    <text x="519" y="361" fill="#64717a" font-size="11" font-weight="900">?</text>

    <rect x="276" y="396" width="16" height="16" rx="4" fill="#147df5"/>
    <text x="306" y="410" fill="#47535c" font-size="14" font-weight="800">Verify SOCKS proxy after startup</text>
    <circle cx="552" cy="405" r="8" fill="#ffffff" stroke="#cbd5dc"/>
    <text x="549" y="409" fill="#64717a" font-size="11" font-weight="900">?</text>

    <rect x="276" y="444" width="16" height="16" rx="4" fill="#147df5"/>
    <text x="306" y="458" fill="#47535c" font-size="14" font-weight="800">Auto reconnect tunnel</text>
    <circle cx="478" cy="453" r="8" fill="#ffffff" stroke="#cbd5dc"/>
    <text x="475" y="457" fill="#64717a" font-size="11" font-weight="900">?</text>

    <rect x="276" y="492" width="16" height="16" rx="4" fill="#ffffff" stroke="#8a949b"/>
    <text x="306" y="506" fill="#47535c" font-size="14" font-weight="800">Start selected tunnel on app launch</text>
    <circle cx="572" cy="501" r="8" fill="#ffffff" stroke="#cbd5dc"/>
    <text x="569" y="505" fill="#64717a" font-size="11" font-weight="900">?</text>

    <text x="276" y="548" fill="#47535c" font-size="14" font-weight="800">Reconnect delay, sec</text>
    <circle cx="428" cy="543" r="8" fill="#ffffff" stroke="#cbd5dc"/>
    <text x="425" y="547" fill="#64717a" font-size="11" font-weight="900">?</text>
    <rect x="276" y="558" width="450" height="36" rx="6" fill="#fbfcfd" stroke="#c7cdd1"/>
    <text x="292" y="582" fill="#172026" font-size="14" font-weight="800">3</text>
  </g>

  <rect x="800" y="42" width="300" height="160" rx="10" fill="#ffffff" stroke="#d8dde1"/>
  <text x="824" y="78" fill="#172026" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="900">Inline help</text>
  <text x="824" y="108" fill="#47535c" font-family="Inter,Arial,sans-serif" font-size="14">Every setting has a small question</text>
  <text x="824" y="130" fill="#47535c" font-family="Inter,Arial,sans-serif" font-size="14">mark explaining what it changes</text>
  <text x="824" y="152" fill="#47535c" font-family="Inter,Arial,sans-serif" font-size="14">and which value is recommended.</text>
</svg>
